; PlatformIO Project Configuration File
; CHOPP ESP32 — Protocolo BLE Industrial v2.1
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esplolin_c3_mini32dev
;default_envs = esp32-s3-devkitc-1
;default_envs = esp32dev

; ── Configuração compartilhada entre todos os ambientes ───────────────────
[env]
platform  = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    me-no-dev/ESPAsyncWebServer@^3.6.0
    miguelbalboa/MFRC522@^1.4.12

; ── Lolin C3 Mini (padrão de produção) ───────────────────────────────────
[env:esplolin_c3_mini32dev]
board = lolin_c3_mini
board_build.partitions = no_ota.csv
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; ── Protocolo BLE Industrial v2.1 ──
    -DPROTOCOLO_BLE_V2=1
    -DPROTOCOLO_BLE_V21=1
    ; ── Otimizações de performance BLE ──
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED=1
    ; ── Stack sizes ──
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192
; Inclui apenas os arquivos do protocolo v2 (exclui legados operaBLE, operacional, etc.)
build_src_filter =
    +<main.cpp>
    +<config.h>
    +<protocol.h>
    +<ble_protocol.cpp>
    +<ble_protocol.h>
    +<command_parser.cpp>
    +<command_parser.h>
    +<command_history.cpp>
    +<command_history.h>
    +<command_queue.cpp>
    +<command_queue.h>
    +<valve_controller.cpp>
    +<valve_controller.h>
    +<flow_sensor.cpp>
    +<flow_sensor.h>
    +<watchdog.cpp>
    +<watchdog.h>
    +<operaRFID.cpp>
    +<operaRFID.h>

; ── ESP32-S3 DevKit ───────────────────────────────────────────────────────
[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DPROTOCOLO_BLE_V2=1
build_src_filter =
    +<main.cpp>
    +<config.h>
    +<protocol.h>
    +<ble_protocol.cpp>
    +<ble_protocol.h>
    +<command_parser.cpp>
    +<command_parser.h>
    +<command_history.cpp>
    +<command_history.h>
    +<command_queue.cpp>
    +<command_queue.h>
    +<valve_controller.cpp>
    +<valve_controller.h>
    +<flow_sensor.cpp>
    +<flow_sensor.h>
    +<watchdog.cpp>
    +<watchdog.h>
    +<operaRFID.cpp>
    +<operaRFID.h>

; ── ESP32 Dev (genérico) ──────────────────────────────────────────────────
[env:esp32dev]
board = esp32dev
build_flags =
    -DPROTOCOLO_BLE_V2=1
build_src_filter =
    +<main.cpp>
    +<config.h>
    +<protocol.h>
    +<ble_protocol.cpp>
    +<ble_protocol.h>
    +<command_parser.cpp>
    +<command_parser.h>
    +<command_history.cpp>
    +<command_history.h>
    +<command_queue.cpp>
    +<command_queue.h>
    +<valve_controller.cpp>
    +<valve_controller.h>
    +<flow_sensor.cpp>
    +<flow_sensor.h>
    +<watchdog.cpp>
    +<watchdog.h>
    +<operaRFID.cpp>
    +<operaRFID.h>
